<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title> PRISE DE RENDEZ-VOUS </title>
    <style>
        body { 
            font-family: Arial, sans serif;
            margin: 0;
            padding: 0;
            background-image: url('fond.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            text-align: center;
         }
         h1 {
            margin-top: 50px;
          }
        form {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            margin: auto;
            margin-top: 100px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
         }
         label {
            display: block;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
          }
        input,button {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 20px; 
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        input { 
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 123, 225, 0.5);
            background-color: #f9f9f9;
            color: #333;
        }
        button { 
            background-color: #007bff; 
            color: white; 
            border: none; 
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
    </style>
</head>
<body style="margin: 0; padding: 0;background-image: url('fond.jpg.jpeg'); background-size: cover; background-position: center; background-repeat: no-repeat;">
    <h1>Prendre un rendez-vous</h1>
    <form id="appointmentForm">
        <label>Nom du patient:</label>
        <input type="texte" id="patientName" required>
        <label>Date :</label>
        <input type="date" id="appoitmenDate" required>
        <label>Heure :</label>
        <input type="time" id="appoitmentime" required>
        <button type="submit">Enregistrer</button>
        </form>
</body>
</html>
